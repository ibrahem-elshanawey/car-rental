<app-filter (filterChange)="getCars($event)"></app-filter>



<div *ngIf="loading" class="text-center">
  <div class="spinner-border"></div>
</div>

<div *ngIf="!loading && cars.length === 0" class="text-center">
  No Cars Available
</div>

<div class="row">

  <div class="col-md-4 mb-4" *ngFor="let car of cars">

    <div class="card shadow-sm h-100">

      <img src="image/Toyota-Camry.jpg"
           class="card-img-top">

      <div class="card-body d-flex flex-column">

        <h5 class="card-title">{{ car.name }}</h5>

        <p class="text-muted mb-1">
          {{ car.brand }} - {{ car.model }}
        </p>

        <p class="fw-bold text-primary">
          {{ car.price_per_day | currency:'EGP' }} / day
        </p>

        <a class="btn btn-outline-primary mt-auto" [routerLink]="['/customer/cars/details', car.id]">
          {{ 'CARS.VIEW_DETAILS' | translate }}
        </a>

      </div>

    </div>

  </div>

</div>
<app-pagination
  [currentPage]="currentPage"
  [lastPage]="lastPage"
  [total]="total"
  [perPage]="perPage"
  (pageChange)="onPageChange($event)"></app-pagination>
