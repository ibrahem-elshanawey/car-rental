 <div *ngIf="lastPage > 1"
         class="d-flex justify-content-between align-items-center mt-3 px-1">

      <!-- Info text -->
      <small class="text-muted">
        Showing {{ (currentPage - 1) * perPage + 1 }}–{{ Math.min(currentPage * perPage, total) }}
        of {{ total }} results
      </small>

      <!-- Page buttons -->
      <ul class="pagination pagination-sm mb-0">

        <!-- Prev -->
        <li class="page-item" [class.disabled]="currentPage === 1">
          <button class="page-link" (click)="goToPage(currentPage - 1)">
            &laquo;
          </button>
        </li>

        <!-- Page numbers with ellipsis -->
        <ng-container *ngFor="let p of pages">
          <li *ngIf="p === -1" class="page-item disabled">
            <span class="page-link">…</span>
          </li>
          <li *ngIf="p !== -1" class="page-item" [class.active]="p === currentPage">
            <button class="page-link" (click)="goToPage(p)">{{ p }}</button>
          </li>
        </ng-container>

        <!-- Next -->
        <li class="page-item" [class.disabled]="currentPage === lastPage">
          <button class="page-link" (click)="goToPage(currentPage + 1)">
            &raquo;
          </button>
        </li>

      </ul>
    </div>
