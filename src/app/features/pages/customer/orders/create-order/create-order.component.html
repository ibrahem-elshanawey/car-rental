<div class="container mt-4">

  <div class="card p-4 shadow-sm">

    <h4 class="mb-4">{{ 'ORDER.CREATE' | translate }}</h4>

   

    <!-- Error -->
    <div *ngIf="error" class="alert alert-danger">
      {{ error }}
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <!-- Dates -->
      <div class="row mb-3">
        <div class="col-md-6">
          <label>{{ 'ORDER.DELIVERY_DATE' | translate }}</label>
          <input type="date"
                 class="form-control"
                 [min]="today"
                 formControlName="delivery_date">
                 <div *ngIf="f['delivery_date'].touched && f['delivery_date'].invalid"
     class="text-danger small">
  Delivery date is required
</div>
        </div>

        <div class="col-md-6">
          <label>{{ 'ORDER.RECEIVING_DATE' | translate }}</label>
          <input type="date"
                 class="form-control"
                 [min]="today"
                 formControlName="receiving_date">
                 <div *ngIf="f['receiving_date'].touched && f['receiving_date'].invalid"
     class="text-danger small">
  Receiving date is required
</div>
        </div>
      </div>

      <!-- Days -->
      <div *ngIf="days > 0" class="alert alert-info">
        {{ 'ORDER.DayS' | translate }}: {{ days }}
      </div>

      <!-- Payment -->
      <div class="mb-3">
        <label>{{ 'ORDER.PAYMENT_TYPE' | translate }}</label>
        <select class="form-control" formControlName="payment_type">
          <option value="cash">Cash</option>
          <option value="visa">Visa</option>
          <option value="tamara">Tamara</option>
        </select>
      </div>

      <!-- Order Type -->
      <div class="mb-3">
        <label>{{ 'ORDER.ORDER_TYPE' | translate }}</label>
        <select class="form-control" formControlName="order_type">
          <option value="full">Full</option>
          <option value="installments">Installments</option>
        </select>
      </div>

      <!-- Installments -->
      <div *ngIf="showInstallments" class="bg-light p-3 rounded mb-3">

        <h6>{{ 'NAV.INSTALLMENTS' | translate }}</h6>

        <input type="number"
               class="form-control mb-2"
               placeholder="{{ 'ORDER.Downpayment' | translate }}"
               formControlName="down_payment">
<div *ngIf="f['down_payment'].touched && f['down_payment'].invalid"
     class="text-danger small">
  Down payment is required and must be greater than 0
</div>
        <input type="number"
               class="form-control"
               placeholder="{{ 'ORDER.Number of Installments' | translate }}"
               formControlName="number_of_installments">

<div *ngIf="f['number_of_installments'].touched && f['number_of_installments'].invalid"
     class="text-danger small">
  Number of installments is required and must be between 1 and 12
</div>

      </div>

      <!-- Button -->
      <button class="btn btn-success w-100" [disabled]="loading">

        <span *ngIf="!loading">{{ 'ORDER.CONFIRM' | translate }}</span>
        <span *ngIf="loading" class="spinner-border spinner-border-sm"></span>

      </button>

    </form>

  </div>

</div>
