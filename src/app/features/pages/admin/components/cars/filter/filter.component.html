<div class="card p-3 mb-3">

  <div class="row">

    <div class="col-md-3 mb-2">
      <input class="form-control" placeholder="Search"
             [(ngModel)]="filters.search">
    </div>

    <div class="col-md-3 mb-2">
      <input class="form-control" placeholder="Brand"
             [(ngModel)]="filters.brand">
    </div>

    <div class="col-md-2 mb-2">
      <input class="form-control" placeholder="Min Price"
             [(ngModel)]="filters.min_price">
    </div>

    <div class="col-md-2 mb-2">
      <input class="form-control" placeholder="Max Price"
             [(ngModel)]="filters.max_price">
    </div>

    <div class="col-md-2 mb-2">
      <button class="btn btn-primary w-100" (click)="apply()">Filter</button>
    </div>

  </div>

</div>
