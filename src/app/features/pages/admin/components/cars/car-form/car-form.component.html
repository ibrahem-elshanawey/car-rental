<div class="container d-flex justify-content-center mt-5">
  <div class="card p-4 shadow-lg col-lg-8 col-md-8 col-12">

    <h4 class="text-center mb-4">
      {{ isEdit ? 'Edit Car' : 'Add Car' }}
    </h4>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <!-- Name -->
      <div class="mb-3">
        <input class="form-control" placeholder="Car Name" formControlName="name">
        <small class="text-danger" *ngIf="f['name'].touched && f['name'].invalid">
          Name is required
        </small>
      </div>

      <!-- Brand -->
      <div class="mb-3">
        <input class="form-control" placeholder="Brand" formControlName="brand">
        <small class="text-danger" *ngIf="f['brand'].touched && f['brand'].invalid">
          Brand is required
        </small>
      </div>

      <!-- Model -->
      <div class="mb-3">
        <input class="form-control" placeholder="Model" formControlName="model">
        <small class="text-danger" *ngIf="f['model'].touched && f['model'].invalid">
          Model is required
        </small>
      </div>

      <!-- Kilometers -->
      <div class="mb-3">
        <input type="number" class="form-control" placeholder="Kilometers" formControlName="kilometers">
        <small class="text-danger" *ngIf="f['kilometers'].touched && f['kilometers'].invalid">
          Kilometers required
        </small>
      </div>

      <!-- Price -->
      <div class="mb-3">
        <input type="number" class="form-control" placeholder="Price per day" formControlName="price_per_day">
        <small class="text-danger" *ngIf="f['price_per_day'].touched && f['price_per_day'].invalid">
          Price required
        </small>
      </div>

      <!-- Button -->
      <button class="btn btn-primary w-100" [disabled]="form.invalid">
        {{ isEdit ? 'Update Car' : 'Create Car' }}
      </button>

    </form>

  </div>
</div>
