<div class="card p-3 mb-3">

<div class="row">

  <div class="col-md-3">
    <input class="form-control" placeholder="Search" [(ngModel)]="filters.search">
  </div>

  <div class="col-md-3 mb-2">
    <select class="form-control" [(ngModel)]="filters.role">
      <option value="">All Roles</option>
      <option value="admin">Admin</option>
      <option value="customer">Customer</option>
    </select>
  </div>

  <div class="col-md-3 mb-2">
    <input class="form-control" placeholder="Country" [(ngModel)]="filters.country">
  </div>

  <div class="col-md-3 mb-2">
    <button class="btn btn-primary w-100" (click)="apply()">Filter</button>
  </div>

</div>
</div>
