  <app-order-filter (filterChange)="loadOrders($event)"></app-order-filter>

<div class="card p-3">


  <app-table
    [columns]="columns"
    [data]="orders"

    [currentPage]="currentPage"
    [lastPage]="lastPage"
    [total]="total"

    (pageChange)="onPageChange($event)"
    (action)="handleAction($event)">
  </app-table>

</div>
