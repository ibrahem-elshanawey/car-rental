<div class="card p-3 mb-3">
<div class="row ">

  <div class="col-md-2 mb-2">
    <input class="form-control" placeholder="Search" [(ngModel)]="filters.search">
  </div>

  <div class="col-md-2 mb-2">
    <input class="form-control" placeholder="User ID" [(ngModel)]="filters.user_id">
  </div>

  <div class="col-md-2 mb-2">
    <input class="form-control" placeholder="Car ID" [(ngModel)]="filters.car_id">
  </div>

  <div class="col-md-2 mb-2">
    <select class="form-control" [(ngModel)]="filters.payment_status">
      <option value="" selected>Status</option>
      <option value="pending">Pending</option>
      <option value="success">Success</option>
      <option value="failed">Failed</option>
    </select>
  </div>
<div class="col-md-2 mb-2">
    <select class="form-control" [(ngModel)]="filters.payment_type">
      <option value="" selected>Payment Type</option>
      <option value="cash">Cash</option>
      <option value="visa">Visa</option>
      <option value="tamara">tamara</option>
    </select>
  </div>
  <div class="col-md-2 mb-2">
    <select class="form-control" [(ngModel)]="filters.order_type">
      <option value="" selected>Order Type</option>
      <option value="full">Full</option>
      <option value="installments">Installments</option>
    </select>
  </div>
  
  <div class="col-md-2">
    <button class="btn btn-primary w-100" (click)="apply()">Filter</button>
  </div>

</div>
</div>
