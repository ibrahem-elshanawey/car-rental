<div class="card p-3">

  <!-- Loading -->
  <div *ngIf="loading; else tableContent" class="text-center">
    <div class="spinner"></div>
  </div>

 <ng-template #tableContent>

  <div *ngIf="data.length === 0">
    No Data
  </div>
  <!-- Table -->
    <div *ngIf="data.length > 0" class="table-responsive">
  <table class="table table-hover align-middle mb-0">

    <thead class="table-light">
      <tr>
        <th *ngFor="let col of columns">{{ col.label | translate }}</th>
        <th *ngIf="hasActions">{{'global.Actions' | translate}}</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let row of data">

        <td *ngFor="let col of columns">
          {{ row[col.key] }}
        </td>

        <!-- Actions -->
        <td *ngIf="hasActions">
          <ng-container *ngFor="let col of columns">
    <ng-container *ngIf="col.actions">

      <!-- View -->
      <button *ngIf="col.actions.includes('view')"
              class="btn btn-sm btn-info me-2"
              (click)="action.emit({ type: 'view', row })">
        {{'global.View' | translate}}
      </button>

      <!-- Edit -->
      <button *ngIf="col.actions.includes('edit')"
              class="btn btn-sm btn-primary me-2"
              (click)="action.emit({ type: 'edit', row })">
        Edit
      </button>

      <!-- Delete -->
      <button *ngIf="col.actions.includes('delete')"
              class="btn btn-sm btn-danger"
              (click)="action.emit({ type: 'delete', row })">
        Delete
      </button>
      <button *ngIf="col.actions.includes('pay')"
        class="btn btn-sm btn-success"
        [disabled]="row.status === 'paid' || row.loading"
        (click)="action.emit({ type: 'pay', row })">

  <span *ngIf="!row.loading">{{'INSTALLMENTS.PAY' | translate}}</span>
  <span *ngIf="row.loading" class="spinner-border spinner-border-sm"></span>

</button>
       <div *ngIf="col.actions.includes('status')" class="dropdown d-inline">

        <button class="btn btn-sm dropdown-toggle"
                [ngClass]="getStatusClass(row.payment_status)"
                data-bs-toggle="dropdown">
          update status
        </button>

        <ul class="dropdown-menu">

          <li>
            <button class="dropdown-item"
                    (click)="changeStatus(row, 'pending')">
              Pending
            </button>
          </li>

          <li>
            <button class="dropdown-item"
                    (click)="changeStatus(row, 'success')">
              Success
            </button>
          </li>

          <li>
            <button class="dropdown-item"
                    (click)="changeStatus(row, 'failed')">
              Failed
            </button>
          </li>

        </ul>

      </div>

    </ng-container>
  </ng-container>
        </td>

      </tr>
    </tbody>

  </table>
</div>
      <div *ngIf="lastPage > 1"
         class="d-flex justify-content-between align-items-center mt-3 px-1">

      <!-- Info text -->
      <small class="text-muted">
        Showing {{ (currentPage - 1) * perPage + 1 }}–{{ Math.min(currentPage * perPage, total) }}
        of {{ total }} results
      </small>

      <!-- Page buttons -->
      <ul class="pagination pagination-sm mb-0">

        <!-- Prev -->
        <li class="page-item" [class.disabled]="currentPage === 1">
          <button class="page-link" (click)="goToPage(currentPage - 1)">
            &laquo;
          </button>
        </li>

        <!-- Page numbers with ellipsis -->
        <ng-container *ngFor="let p of pages">
          <li *ngIf="p === -1" class="page-item disabled">
            <span class="page-link">…</span>
          </li>
          <li *ngIf="p !== -1" class="page-item" [class.active]="p === currentPage">
            <button class="page-link" (click)="goToPage(p)">{{ p }}</button>
          </li>
        </ng-container>

        <!-- Next -->
        <li class="page-item" [class.disabled]="currentPage === lastPage">
          <button class="page-link" (click)="goToPage(currentPage + 1)">
            &raquo;
          </button>
        </li>

      </ul>
    </div>
    </ng-template>

</div>
